services:
  - type: web
    name: quantonion
    env: python
    plan: free
    buildCommand: pip install -r requirements.dashboard.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4
      # Add ALPHAVANTAGE_API_KEY, TWELVE_DATA_API_KEY as environment variables
      # in the Render dashboard (not here in YAML).
      # ConnectOnion AI features require `co auth` — not a key in env vars.
