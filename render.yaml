services:
  - type: web
    name: quantonion
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: PORT
        value: "8000"
      # CO_AGENT_KEY_B64: base64-encoded .co/keys/agent.key
      # Generate with: base64 -i .co/keys/agent.key | tr -d '\n'
      - key: CO_AGENT_KEY_B64
        sync: false
      # OPENONION_API_KEY: JWT from ~/.co/keys.env (set by 'co auth')
      - key: OPENONION_API_KEY
        sync: false
